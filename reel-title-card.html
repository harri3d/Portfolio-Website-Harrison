<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harrison Dorn — Reel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0e0e0e;
      color: #f5efe8;
      font-family: "DM Sans", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    /* Placeholder — remove when you swap in the real image */
    .logo-placeholder {
      width: 80px;
      height: 80px;
      border: 1px dashed #2a2420;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8c7e72;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .name {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f5efe8;
    }

    .reel-title {
      font-size: 1.5rem;
      font-weight: 300;
      color: #e8622a;
    }

    .contact {
      font-size: 0.875rem;
      font-weight: 400;
      color: #8c7e72;
      margin-top: 0.25rem;
    }

    /* Software icons */
    .sw-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 0.25rem;
    }

    .sw-icon img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
      opacity: 0.75;
    }

    /* Placeholder — remove when you swap in real icons */
    .sw-icon .ph {
      width: 28px;
      height: 28px;
      border: 1px dashed #2a2420;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8c7e72;
      font-size: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo: swap div for <img class="logo" src="logo.png" alt="Logo"> -->
    <div class="logo-placeholder">Logo</div>

    <p class="name">harrison dorn</p>
    <p class="reel-title">FX Artist &amp; 3D Generalist Reel</p>
    <p class="contact">yourname@email.com</p>

    <!-- Software icons: swap each .ph div for <img src="houdini.svg" alt="Houdini"> -->
    <div class="sw-row">
      <div class="sw-icon"><div class="ph">1</div></div>
      <div class="sw-icon"><div class="ph">2</div></div>
      <div class="sw-icon"><div class="ph">3</div></div>
      <div class="sw-icon"><div class="ph">4</div></div>
      <div class="sw-icon"><div class="ph">5</div></div>
      <div class="sw-icon"><div class="ph">6</div></div>
    </div>

  </div>
</body>
</html>
