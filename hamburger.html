    <style>


        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
        }
        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        body {
            font-family: 'DM Sans', sans-serif;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            overflow: hidden; /* Prevent scrollbar */
        }

        .project-card {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3 / 2; /* Maintain aspect ratio */
            transition: box-shadow 0.3s ease-in-out;
            margin: 10px;


        }

        .project-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255, 123, 0, 0.808), rgb(255, 72, 0));
            opacity: 0;
            mix-blend-mode: overlay;
            transition: opacity 0.3s ease;
            pointer-events: none;



        }

        .project-card:hover .project-image {
            transform: scale(1.05);


        }
        .project-card:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.116);
            }

        .project-card:hover .project-overlay {
            opacity: 1;
        }
        
        .about-image-link {
        display: inline-block;
        border-radius: 30px;
        overflow: hidden;
        transition: box-shadow 0.3s ease-out;
        }
        .about-image-link img {
            display: block;
            width: 5rem;
            height: 5rem;
            object-fit: cover;
        }
        .about-image-link:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.13);
            transform: scale(1.03);

        }
        .container {
            height: 100vh;
            overflow-y: scroll;
        }

        .card {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            will-change: transform;
            transition: transform 0.3s ease-out; /* Increased duration for smoother effect */
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.055);
            opacity: 0;
            transform: scale(0.97);
            transition: 
                opacity .7s ease-in-out, /* Increased duration */
                transform .7s ease-in-out; /* Increased duration */
            will-change: opacity, transform;
        }
        .card.active img {
            opacity: 1;
            transform: scale(1);
        }
        .card.above img {
            opacity: 0;
            transform: scale(0.97);
        }
    </style>
