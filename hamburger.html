<script>
    document.addEventListener('DOMContentLoaded', () => {
  const btnOpen = document.querySelector('.topnav__open');
  const btnClose = document.querySelector('.topnav__close');
  const menu = document.querySelector('.topnav__menu');

  console.log({ btnOpen, btnClose, menu }); // ← add this to verify all 3 are found

  btnOpen.addEventListener('click', () => {
    menu.classList.add('is-open');
    btnOpen.setAttribute('aria-expanded', 'true');
  });

  btnClose.addEventListener('click', () => {
    menu.classList.remove('is-open');
    btnOpen.setAttribute('aria-expanded', 'false');
  });

  document.querySelectorAll('.topnav__link').forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.remove('is-open');
      btnOpen.setAttribute('aria-expanded', 'false');
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      menu.classList.remove('is-open');
      btnOpen.setAttribute('aria-expanded', 'false');
    }
  });
});
    </script>
<style>
/* ─── Design Tokens ────────────────────────────────────────────────────────── */

:root {
  /* Colors */
  --color-bg:        #0e0e0e;
  --color-surface:   #111111;
  --color-border:    #2a2420;
  --color-text:      #f5efe8;
  --color-muted:     #8c7e72;
--color-accent:       #e8622a;
  --color-accent-hover: #ff4500;

  /* Type scale (major third, 1.25×) */
  --text-xs:   0.75rem;   /* 12px */
  --text-sm:   0.875rem;  /* 14px */
  --text-base: 1rem;      /* 16px */
  --text-md:   1.25rem;   /* 20px */
  --text-lg:   1.5rem;    /* 24px */
  --text-xl:   2rem;      /* 32px */
  --text-2xl:  2.5rem;    /* 40px */
  --text-3xl:  3.25rem;   /* 52px */

  /* Spacing */
  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-24: 6rem;

  /* Layout */
  --sidebar-width: 220px;
  --content-max:   760px;

  /* Motion */
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --duration-fast: 120ms;
  --duration-base: 220ms;
  --duration-slow: 500ms;
}

/* ─── Animations ────────────────────────────────────────────────────────────── */

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes unblur {
  from { filter: blur(3px); opacity: 0.1; }
  to   { filter: blur(0);   opacity: 1; }
}

@keyframes blink {
  0%, 100% { opacity: 0; }
  50%       { opacity: 1; }
}

/* ─── Reset / Base ──────────────────────────────────────────────────────────── */

*, *::before, *::after {
  box-sizing: border-box;
}


html, body {
  height: 100%;

}

body {
  margin: 0;
  background-color: var(--color-bg);
  color: var(--color-text);
  font-family: "DM Sans", sans-serif;
  font-size: var(--text-base);
  font-weight: 300;
  line-height: 1.65;
  padding-left: calc(var(--sidebar-width) + var(--space-8));
  padding-right: var(--space-6);
  padding-top: var(--space-8);
  padding-bottom: var(--space-24);
}



/* ─── Navigation ─────────────────────────────────────────────────────────────── */

.topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-width);
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: var(--space-16) var(--space-6) var(--space-16) var(--space-4);
  overflow-y: auto;
  z-index: 100;
  border-right: 1px solid var(--color-border);
  background-color: var(--color-bg);
}

.topnav button {
  display: none;
  position: fixed;
  right: var(--space-4);
  top: var(--space-4);
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  color: var(--color-text);
  z-index: 200;
}

.topnav__links {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  list-style: none;
  margin: 0;
  padding: 0;
  text-align: right;
}

.topnav__item {
  list-style: none;
}

.topnav__link {
  font-size: var(--text-sm);
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--color-muted);
  text-decoration: none;
  display: block;
  padding: var(--space-1) 0;
  transition: color var(--duration-fast) ease;
}

.topnav__link:hover,
.topnav__link.active {
  color: var(--color-text);
}

/* Desktop styles for topnav__menu */
.topnav__menu {
  display: flex;
  flex-direction: column;
  width: 100%;
}

/* ─── Logo ───────────────────────────────────────────────────────────────────── */

.logo {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: var(--space-6);
  padding: 0 var(--space-2);
}


/* ─── Responsive ─────────────────────────────────────────────────────────────── */

        .mobile-gap {
        display: none;
        height: 0;
        }

        @media (max-width: 80em) {
        .mobile-gap {
            display: block;
            height: 10vh;
        }
        }

        @media (max-width: 768px) {
        .mobile-gap {
            display: block;
            height: 5vh;
        }
        }

@media (max-width: 80em) {
  body {
    padding: var(--space-16) var(--space-4) var(--space-12);
        overflow-x: hidden;  /* already on body globally, but reinforce here */

  }

.topnav .topnav__links {
    display: none;
  }
  
  /* Hamburger button visible on mobile */
    .topnav button {
    display: block;
    position: fixed;
    right: var(--space-4);
    top: var(--space-4);
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: var(--color-text);
    z-index: 200;
  }

  .topnav {
    width: 100%;
    height: auto;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-3) var(--space-4);
    border-right: none;
    border-bottom: 1px solid var(--color-border);
    position: fixed;
    top: 0;
    left: 0;
  }
  .topnav__menu {
    display: block;
    position: fixed;
    inset: 0;
    padding: var(--space-16) var(--space-8);
    background: linear-gradient(135deg, var(--color-bg) 60%, rgba(8,8,8,0.95) 100%);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s var(--ease-out);
  }

  .topnav__menu.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  .topnav__close {
    display: block;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }

  .topnav__links {
    flex-direction: column;
    gap: var(--space-3);
    text-align: left;
    padding: var(--space-8) 0;
  }

  .topnav__link {
    font-size: var(--text-lg);
  }

  .logo {
    width: 32px;
    padding: 0;
    margin: 0;
  }

}
    </style>
   
</head>
