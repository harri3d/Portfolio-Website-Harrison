<style>
 /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 3px;
    }
 
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px)  { .grid { grid-template-columns: 1fr; } }
 
    /* ── Card ── */
    .card {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
 
    .card.visible { opacity: 1; }
 
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, filter 0.3s ease;
      filter: brightness(0.93);
    }
 
    .card:hover img {
      transform: scale(1.04);
      filter: brightness(0.45);
    }
 
    /* ── Overlay ── */
    .card-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.2rem 1.1rem 1rem;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
 
    .card:hover .card-overlay { opacity: 1; }
 
    .card-title {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      line-height: 1.2;
    }
 
    .card-meta {
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #888;
      margin-top: 0.25rem;
    }
</style>

<script>
  const works = [
    { slug: "murderbot", title: "The Murderbot Diaries Fan Trailer", category: "3D / Animation", img: "images/harrison-dorn-maxresdefault.jpg" },
    { slug: "jumping-spider", title: "Jumping Spider", category: "3D Modeling", img: "images/harrison-dorn-0002.jpg" },
    { slug: "corvette", title: "Corvette Stingray", category: "3D Modeling", img: "images/harrison-dorn-corvette-stingray1.jpg" },
    { slug: "broomstick", title: "Witch's Broomstick", category: "Game Modeling", img: "images/harrison-dorn-witch-s-broomstick.jpg" },
  ];

  const grid = document.getElementById('grid');

  works.forEach((work, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = `project.html?project=${work.slug}`;
    card.innerHTML = `
      <img src="${work.img}" alt="${work.title}" loading="lazy" />
      <div class="card-overlay">
        <div class="card-title">${work.title}</div>
        <div class="card-meta">${work.category}</div>
      </div>
    `;
    grid.appendChild(card);
    setTimeout(() => card.classList.add('visible'), 40 + i * 50);
  });
</script>
